<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Presenter View — reThought Slides</title>

<!-- Google Fonts: Poppins (display), Instrument Sans (body), Geist Mono (labels) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ===========================================
   RETHOUGHT DESIGN TOKENS — DARK MODE
   =========================================== */
:root {
    --ink: #1B252F;
    --ink-soft: #222E3A;
    --ink-deep: #151D26;
    --paper: #fbfbfb;
    --bone: #f5f1ea;
    --brand: #034c76;
    --brand-deep: #0a6399;
    --brand-light: #6ba8d6;
    --sprout: #8cc94e;
    --sprout-soft: #b4dc84;
    --clay: #c05445;
    --muted: #6e7a88;
    --muted-2: #95a0ae;
    --border-d: #ffffff18;

    --font-display: 'Poppins', sans-serif;
    --font-sans: 'Instrument Sans', sans-serif;
    --font-mono: 'Geist Mono', monospace;
}

/* ===========================================
   RESET & BASE
   =========================================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    height: 100%;
    overflow: hidden;
    background: var(--ink);
    color: var(--paper);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
}
::selection { background: var(--sprout); color: var(--ink); }

/* ===========================================
   LAYOUT — Full-screen grid
   =========================================== */
body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr;
}

/* --- Top Bar --- */
.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1.2rem;
    background: var(--ink-deep);
    border-bottom: 1px solid var(--border-d);
    gap: 1rem;
    min-height: 48px;
}
.top-bar__title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--paper);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
}
.top-bar__meta {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    flex-shrink: 0;
}
.top-bar__timer,
.top-bar__counter {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--sprout);
    letter-spacing: 0.5px;
}
.top-bar__counter {
    color: var(--muted-2);
}

/* --- Main Area --- */
.main-area {
    display: grid;
    grid-template-columns: 60% 40%;
    overflow: hidden;
    gap: 0;
}

/* --- Current Slide Preview (left panel) --- */
.current-slide-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: var(--ink);
    border-right: 1px solid var(--border-d);
    overflow: hidden;
}
.slide-preview-container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.slide-preview-wrapper {
    position: relative;
    background: var(--ink-soft);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    /* Dimensions set by JS based on aspect ratio */
}
.slide-preview-wrapper iframe {
    border: none;
    transform-origin: top left;
    /* Width, height, and transform set by JS */
}
.current-slide-label {
    position: absolute;
    top: 8px;
    left: 10px;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--sprout);
    opacity: 0.7;
}

/* --- Right Panel (next slide + notes) --- */
.right-panel {
    display: grid;
    grid-template-rows: 35% 65%;
    overflow: hidden;
}

/* Next slide preview */
.next-slide-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.8rem;
    background: var(--ink-soft);
    border-bottom: 1px solid var(--border-d);
    position: relative;
    overflow: hidden;
}
.next-slide-wrapper {
    position: relative;
    background: var(--ink-deep);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.next-slide-wrapper iframe {
    border: none;
    transform-origin: top left;
}
.next-slide-label {
    position: absolute;
    top: 6px;
    left: 8px;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted-2);
    opacity: 0.7;
    z-index: 2;
}

/* Speaker notes */
.notes-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--ink);
    padding: 1rem 1.2rem;
}
.notes-panel__label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
    flex-shrink: 0;
}
.notes-panel__content {
    flex: 1;
    overflow-y: auto;
    font-family: var(--font-sans);
    font-size: 1rem;
    line-height: 1.65;
    color: var(--muted-2);
    padding-right: 0.5rem;
}
.notes-panel__content::-webkit-scrollbar {
    width: 4px;
}
.notes-panel__content::-webkit-scrollbar-track {
    background: transparent;
}
.notes-panel__content::-webkit-scrollbar-thumb {
    background: var(--muted);
    border-radius: 2px;
}
/* Notes paragraph styling */
.notes-panel__content p {
    margin-bottom: 0.8em;
}
.notes-panel__content strong {
    color: var(--paper);
    font-weight: 600;
}
.notes-panel__content hr {
    border: none;
    border-top: 1px solid var(--border-d);
    margin: 1em 0;
}
.notes-panel__content .lang-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--sprout);
    display: block;
    margin-bottom: 0.3em;
}
.notes-panel__content .lang-label--below {
    margin-top: 0.3em;
    margin-bottom: 0.3em;
}
.notes-empty {
    color: var(--muted);
    font-style: italic;
    opacity: 0.5;
}

/* --- Bottom Bar --- */
.bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.5rem 1.2rem;
    background: var(--ink-deep);
    border-top: 1px solid var(--border-d);
    gap: 0.6rem;
    min-height: 48px;
}
.btn {
    font-family: var(--font-sans);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.45rem 1.2rem;
    border: 1px solid var(--border-d);
    border-radius: 6px;
    background: var(--ink-soft);
    color: var(--paper);
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
    user-select: none;
}
.btn:hover {
    background: var(--brand-deep);
    border-color: var(--brand-deep);
}
.btn:active {
    transform: scale(0.97);
}
.btn--prev::before { content: "← "; }
.btn--next::after  { content: " →"; }
.btn--reset {
    color: var(--muted-2);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.5px;
}
.btn--reset:hover {
    background: var(--ink-soft);
    color: var(--paper);
    border-color: var(--muted);
}
.btn--end {
    background: var(--clay);
    border-color: var(--clay);
    color: var(--paper);
}
.btn--end:hover {
    background: #d4604f;
    border-color: #d4604f;
}

/* --- Loading / Error States --- */
.loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 1rem;
}
.loading-overlay__text {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--muted-2);
    letter-spacing: 1px;
}
.loading-overlay__spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border-d);
    border-top-color: var(--sprout);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-message {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--clay);
    text-align: center;
    padding: 2rem;
}
</style>
</head>
<body>

<!-- Loading overlay (removed after presentation loads) -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-overlay__spinner"></div>
    <div class="loading-overlay__text">Loading presentation…</div>
</div>

<!-- Top Bar -->
<div class="top-bar">
    <div class="top-bar__title" id="presTitle">Presenter View</div>
    <div class="top-bar__meta">
        <div class="top-bar__timer" id="timer">00:00</div>
        <div class="top-bar__counter" id="counter">— / —</div>
    </div>
</div>

<!-- Main Area -->
<div class="main-area">
    <!-- Left: Current Slide -->
    <div class="current-slide-panel">
        <div class="slide-preview-container" id="currentSlideContainer">
            <span class="current-slide-label">Current</span>
            <div class="slide-preview-wrapper" id="currentSlideWrapper"></div>
        </div>
    </div>

    <!-- Right: Next Slide + Notes -->
    <div class="right-panel">
        <div class="next-slide-panel">
            <span class="next-slide-label">Next</span>
            <div class="next-slide-wrapper" id="nextSlideWrapper"></div>
        </div>
        <div class="notes-panel">
            <div class="notes-panel__label">Speaker Notes</div>
            <div class="notes-panel__content" id="notesContent">
                <span class="notes-empty">No notes for this slide.</span>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
    <button class="btn btn--prev" id="btnPrev" title="Previous slide (←)">Prev</button>
    <button class="btn btn--reset" id="btnReset" title="Reset timer">Reset Timer</button>
    <button class="btn btn--next" id="btnNext" title="Next slide (→)">Next</button>
    <button class="btn btn--end" id="btnEnd" title="End presentation">End</button>
</div>

<script>
/* ===========================================
   PRESENTER VIEW — reThought Slides
   =========================================== */
(function () {
    'use strict';

    // -----------------------------------------------
    // 1. Parse URL parameters
    // -----------------------------------------------
    const params = new URLSearchParams(window.location.search);
    const presentationFile = params.get('file');

    if (!presentationFile) {
        showError('No presentation file specified.<br>Use <code>?file=presentations/session-3.html</code>');
        return;
    }

    // -----------------------------------------------
    // 2. State
    // -----------------------------------------------
    let currentSlide = 0;
    let totalSlides = 0;
    let slideNotes = [];      // Array of raw note strings per slide
    let slideElements = [];   // Array of slide outerHTML strings
    let presTitle = '';
    let timerStart = Date.now();
    let timerInterval = null;
    let audienceWindow = null;

    // DOM references
    const elTitle = document.getElementById('presTitle');
    const elTimer = document.getElementById('timer');
    const elCounter = document.getElementById('counter');
    const elCurrentWrapper = document.getElementById('currentSlideWrapper');
    const elNextWrapper = document.getElementById('nextSlideWrapper');
    const elNotes = document.getElementById('notesContent');
    const elLoading = document.getElementById('loadingOverlay');

    // -----------------------------------------------
    // 3. BroadcastChannel for sync
    // -----------------------------------------------
    const channel = new BroadcastChannel('rethought-slides');

    /** Send navigation command to audience window */
    function broadcastNavigate(slideIndex) {
        channel.postMessage({ type: 'navigate', slide: slideIndex });
    }

    /** Listen for messages from audience window */
    channel.onmessage = function (e) {
        const msg = e.data;
        if (!msg || typeof msg !== 'object') return;

        if (msg.type === 'navigate' && typeof msg.slide === 'number') {
            // Another window navigated — sync to it
            if (msg.slide !== currentSlide && msg.slide >= 0 && msg.slide < totalSlides) {
                currentSlide = msg.slide;
                updatePresenterView();
            }
        } else if (msg.type === 'sync-response' && typeof msg.slide === 'number') {
            // Audience responded with its current slide
            if (msg.slide >= 0 && msg.slide < totalSlides) {
                currentSlide = msg.slide;
                updatePresenterView();
            }
        } else if (msg.type === 'sync-request') {
            // Another window is asking for current position — respond
            channel.postMessage({ type: 'sync-response', slide: currentSlide });
        }
    };

    // -----------------------------------------------
    // 4. Load & Parse Presentation
    // -----------------------------------------------
    fetchPresentation(presentationFile);

    async function fetchPresentation(url) {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            const html = await response.text();
            parsePresentation(html);
        } catch (err) {
            showError(`Failed to load presentation:<br><code>${err.message}</code>`);
        }
    }

    function parsePresentation(html) {
        // Parse the HTML to extract slides and metadata
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Extract title from meta tag
        const metaTitle = doc.querySelector('meta[name="presentation-title"]');
        presTitle = metaTitle ? metaTitle.getAttribute('content') : 'Untitled Presentation';
        elTitle.textContent = presTitle;
        document.title = `Presenter — ${presTitle}`;

        // Extract all .slide elements
        const slides = doc.querySelectorAll('.slide');
        totalSlides = slides.length;

        if (totalSlides === 0) {
            showError('No slides found in presentation.<br>Slides must use <code>class="slide"</code>.');
            return;
        }

        // Store slide HTML and notes
        slides.forEach(function (slide) {
            slideElements.push(slide.outerHTML);
            slideNotes.push(slide.getAttribute('data-notes') || '');
        });

        // Extract the <style> content and linked stylesheets for rendering previews
        const styles = doc.querySelectorAll('style');
        let styleHTML = '';
        styles.forEach(function (s) {
            styleHTML += '<style>' + s.innerHTML + '</style>';
        });

        // Also copy <link> tags for fonts
        const links = doc.querySelectorAll('link[rel="stylesheet"], link[rel="preconnect"]');
        let linkHTML = '';
        links.forEach(function (l) {
            linkHTML += l.outerHTML;
        });

        // Store the combined style preamble for iframes
        window.__slideStylePreamble = linkHTML + styleHTML;

        // Hide loading
        elLoading.style.display = 'none';

        // Set up preview iframes
        createPreviewIframes();

        // Initial render
        updatePresenterView();

        // Start timer
        startTimer();

        // Open audience window
        openAudienceWindow();

        // Request sync from any already-open audience window
        channel.postMessage({ type: 'sync-request' });
    }

    // -----------------------------------------------
    // 5. Preview Iframes
    //    Render slides in sandboxed iframes using srcdoc.
    //    Each iframe gets the presentation styles + one slide.
    // -----------------------------------------------
    let currentIframe = null;
    let nextIframe = null;

    // Slide aspect ratio (16:9)
    const ASPECT_W = 16;
    const ASPECT_H = 9;

    function createPreviewIframes() {
        currentIframe = createScaledIframe(elCurrentWrapper, 'currentPreview');
        nextIframe = createScaledIframe(elNextWrapper, 'nextPreview');

        // Resize on window change
        window.addEventListener('resize', function () {
            fitIframeToContainer(currentIframe, elCurrentWrapper.parentElement);
            fitIframeToContainer(nextIframe, elNextWrapper.parentElement);
        });

        // Initial fit after a short delay to let layout settle
        requestAnimationFrame(function () {
            fitIframeToContainer(currentIframe, elCurrentWrapper.parentElement);
            fitIframeToContainer(nextIframe, elNextWrapper.parentElement);
        });
    }

    function createScaledIframe(wrapper, id) {
        const iframe = document.createElement('iframe');
        iframe.id = id;
        iframe.setAttribute('sandbox', 'allow-same-origin');
        iframe.style.border = 'none';
        iframe.style.transformOrigin = 'top left';
        iframe.style.pointerEvents = 'none';
        iframe.style.position = 'absolute';
        iframe.style.top = '0';
        iframe.style.left = '0';
        wrapper.style.position = 'relative';
        wrapper.style.overflow = 'hidden';
        wrapper.appendChild(iframe);
        return iframe;
    }

    /**
     * Fit an iframe (rendering at 1920x1080) into a container,
     * scaling it down to fit while maintaining 16:9 aspect ratio.
     */
    function fitIframeToContainer(iframe, container) {
        const containerRect = container.getBoundingClientRect();
        // Leave some padding inside the container
        const pad = 16;
        const availW = containerRect.width - pad * 2;
        const availH = containerRect.height - pad * 2;

        if (availW <= 0 || availH <= 0) return;

        // Calculate the wrapper size that fits within available space at 16:9
        let wrapperW, wrapperH;
        if (availW / availH > ASPECT_W / ASPECT_H) {
            // Container is wider than 16:9 — height-constrained
            wrapperH = availH;
            wrapperW = wrapperH * (ASPECT_W / ASPECT_H);
        } else {
            // Container is taller than 16:9 — width-constrained
            wrapperW = availW;
            wrapperH = wrapperW * (ASPECT_H / ASPECT_W);
        }

        // The iframe renders at a "native" resolution
        const nativeW = 1920;
        const nativeH = 1080;
        const scale = wrapperW / nativeW;

        const wrapper = iframe.parentElement;
        wrapper.style.width = wrapperW + 'px';
        wrapper.style.height = wrapperH + 'px';
        wrapper.style.borderRadius = '6px';

        iframe.style.width = nativeW + 'px';
        iframe.style.height = nativeH + 'px';
        iframe.style.transform = 'scale(' + scale + ')';
    }

    /**
     * Render a single slide into an iframe via srcdoc.
     * The iframe gets the full presentation styles plus one slide element,
     * forced to fill the viewport with no scroll snap.
     */
    function renderSlideInIframe(iframe, slideIndex) {
        if (slideIndex < 0 || slideIndex >= totalSlides) {
            // Show blank
            iframe.srcdoc = buildSrcdoc('');
            return;
        }

        const slideHTML = slideElements[slideIndex];
        iframe.srcdoc = buildSrcdoc(slideHTML);
    }

    function buildSrcdoc(slideHTML) {
        return '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
            window.__slideStylePreamble +
            '<style>' +
            'html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }' +
            'html { scroll-snap-type: none !important; scroll-behavior: auto !important; }' +
            '.slide { width: 100vw !important; height: 100vh !important; scroll-snap-align: none !important; }' +
            /* Force all reveal animations to show — previews must be visible immediately */
            '.reveal, .reveal-scale, .reveal-left, .chat-msg, .ig-bubble, ' +
            '.stagger > * { opacity: 1 !important; transform: none !important; transition: none !important; }' +
            /* Force metric bars to fill */
            '.metric-bar-fill { width: var(--fill) !important; transition: none !important; }' +
            /* Hide nav elements in preview */
            '.nav-dots, .progress-bar, .decorative { display: none !important; }' +
            '</style></head><body>' +
            slideHTML +
            '</body></html>';
    }

    // -----------------------------------------------
    // 6. Notes Rendering
    //    Supports: \n\n → paragraph, --- → HR with EN/ES labels, **bold**
    // -----------------------------------------------
    function renderNotes(rawNotes) {
        if (!rawNotes || rawNotes.trim() === '') {
            elNotes.innerHTML = '<span class="notes-empty">No notes for this slide.</span>';
            return;
        }

        // Split on the --- divider (EN/ES language separator)
        const sections = rawNotes.split('---');

        let html = '';
        sections.forEach(function (section, i) {
            // Add language label before/after HR
            if (sections.length > 1) {
                if (i === 0) {
                    html += '<span class="lang-label">EN</span>';
                } else {
                    html += '<hr>';
                    html += '<span class="lang-label lang-label--below">ES</span>';
                }
            }

            // Split into paragraphs on double newline
            const paragraphs = section.split(/\n\n+/);
            paragraphs.forEach(function (para) {
                const trimmed = para.trim();
                if (!trimmed) return;

                // Convert **bold** to <strong>
                const formatted = trimmed
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    // Convert single newlines to <br> within a paragraph
                    .replace(/\n/g, '<br>');

                html += '<p>' + formatted + '</p>';
            });
        });

        elNotes.innerHTML = html;
        // Scroll notes to top
        elNotes.scrollTop = 0;
    }

    // -----------------------------------------------
    // 7. Update the entire presenter view
    // -----------------------------------------------
    function updatePresenterView() {
        // Update counter
        elCounter.textContent = (currentSlide + 1) + ' / ' + totalSlides;

        // Render current slide preview
        renderSlideInIframe(currentIframe, currentSlide);

        // Render next slide preview (or blank if at end)
        renderSlideInIframe(nextIframe, currentSlide + 1);

        // Render notes
        renderNotes(slideNotes[currentSlide]);

        // Re-fit iframes after srcdoc change
        requestAnimationFrame(function () {
            fitIframeToContainer(currentIframe, elCurrentWrapper.parentElement);
            fitIframeToContainer(nextIframe, elNextWrapper.parentElement);
        });
    }

    // -----------------------------------------------
    // 8. Navigation
    // -----------------------------------------------
    function goToSlide(n) {
        const clamped = Math.max(0, Math.min(n, totalSlides - 1));
        if (clamped === currentSlide) return;
        currentSlide = clamped;
        updatePresenterView();
        broadcastNavigate(currentSlide);

        // Also scroll the audience window if we have a reference
        scrollAudienceWindow(currentSlide);
    }

    function nextSlide() { goToSlide(currentSlide + 1); }
    function prevSlide() { goToSlide(currentSlide - 1); }
    function firstSlide() { goToSlide(0); }
    function lastSlide() { goToSlide(totalSlides - 1); }

    /** Scroll the audience popup to the correct slide */
    function scrollAudienceWindow(slideIndex) {
        if (!audienceWindow || audienceWindow.closed) return;
        try {
            const slideEl = audienceWindow.document.querySelectorAll('.slide')[slideIndex];
            if (slideEl) {
                slideEl.scrollIntoView({ behavior: 'smooth' });
            }
        } catch (e) {
            // Cross-origin restriction — rely on BroadcastChannel instead
        }
    }

    // -----------------------------------------------
    // 9. Keyboard Shortcuts
    // -----------------------------------------------
    document.addEventListener('keydown', function (e) {
        // Ignore if user is focused on an input
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        switch (e.key) {
            case 'ArrowRight':
            case 'ArrowDown':
            case ' ':        // Space
            case 'PageDown':
                e.preventDefault();
                nextSlide();
                break;

            case 'ArrowLeft':
            case 'ArrowUp':
            case 'PageUp':
                e.preventDefault();
                prevSlide();
                break;

            case 'Home':
                e.preventDefault();
                firstSlide();
                break;

            case 'End':
                e.preventDefault();
                lastSlide();
                break;
        }
    });

    // -----------------------------------------------
    // 10. Button Handlers
    // -----------------------------------------------
    document.getElementById('btnPrev').addEventListener('click', prevSlide);
    document.getElementById('btnNext').addEventListener('click', nextSlide);
    document.getElementById('btnReset').addEventListener('click', resetTimer);
    document.getElementById('btnEnd').addEventListener('click', function () {
        if (confirm('End presentation and close audience window?')) {
            if (audienceWindow && !audienceWindow.closed) {
                audienceWindow.close();
            }
            window.close();
            // If window.close() doesn't work (not opened by script),
            // navigate to a blank page
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;' +
                'font-family:Poppins,sans-serif;color:#95a0ae;font-size:1.2rem;background:#1B252F;">' +
                'Presentation ended. You can close this tab.</div>';
        }
    });

    // -----------------------------------------------
    // 11. Timer
    // -----------------------------------------------
    function startTimer() {
        timerStart = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        updateTimer();
    }

    function updateTimer() {
        const elapsed = Math.floor((Date.now() - timerStart) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        elTimer.textContent =
            String(minutes).padStart(2, '0') + ':' +
            String(seconds).padStart(2, '0');
    }

    function resetTimer() {
        timerStart = Date.now();
        updateTimer();
    }

    // -----------------------------------------------
    // 12. Open Audience Window
    // -----------------------------------------------
    function openAudienceWindow() {
        // Open the actual presentation file in a new window
        audienceWindow = window.open(presentationFile, 'rethought-audience',
            'width=1280,height=720,menubar=no,toolbar=no,location=no,status=no');

        if (!audienceWindow) {
            console.warn('Popup blocked. Please allow popups for this site to open the audience window.');
        }
    }

    // -----------------------------------------------
    // 13. Error Display
    // -----------------------------------------------
    function showError(message) {
        elLoading.innerHTML = '<div class="error-message">' + message + '</div>';
    }

})();
</script>
</body>
</html>
